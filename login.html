<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Biotechnology | Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#3a1c71,#8e2de2,#4a00e0);
padding:20px;
}

.container{
background:white;
width:100%;
max-width:420px;
padding:35px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width:120px;
}

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:6px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
outline:none;
}

input:focus,select:focus{
border-color:#6a11cb;
}

.password-box{
position:relative;
}

.password-box span{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
}

button{
width:100%;
padding:13px;
background:linear-gradient(90deg,#6a11cb,#2575fc);
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
opacity:.9;
}

.register{
text-align:center;
margin-top:10px;
font-size:14px;
}


.forgot{
text-align:right;
margin-top:-10px;
margin-bottom:15px;
}

.forgot a{
font-size:13px;
color:#6a11cb;
text-decoration:none;
}

.forgot a:hover{
text-decoration:underline;
}

@media (max-width:480px){

.container{
padding:25px;
}

h2{
font-size:20px;
}

}


.btn-group{
display:flex;
gap:10px;
}

.back-btn{
background:#ccc;
color:#333;
font-weight:600;
}

.back-btn:hover{
background:#bbb;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="images/logo2.webp" alt="Stackly Logo">
</div>

<h2>Welcome Back</h2>

<form id="loginForm">

<label>Login As</label>

<select id="role" required>

<option value="">Select Role</option>
<option value="admin">Administrator</option>
<option value="researcher">Researcher</option>
<option value="patient">Patient</option>

</select>

<label>Email Address</label>
<input type="email" id="email" placeholder="Enter email" required>

<label>Password</label>


<div class="password-box">
<input type="password" id="password" required>
<span onclick="togglePassword()">👁</span>
</div>

<div class="forgot">
<a href="404.html">Forgot Password?</a>
</div>

<div class="btn-group">
<button type="button" class="back-btn" onclick="goBack()">Back</button>
<button type="submit">Login</button>
</div>

<script>

    
function goBack(){
window.location.href="index.html"
}

</script>

</form>

<div class="register">
Don't have account? <a href="register.html">Register</a>
</div>

</div>

<script>

function togglePassword(){

let field=document.getElementById("password")

if(field.type==="password"){
field.type="text"
}else{
field.type="password"
}

}

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault()

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let role=document.getElementById("role").value

let user=JSON.parse(localStorage.getItem("stacklyUser"))

if(user && email===user.email && password===user.password && role===user.role){

localStorage.setItem("loggedEmail",email)

if(role==="admin"){
window.location.href="admin-dashboard.html"
}

if(role==="researcher"){
window.location.href="researcher-dashboard.html"
}

if(role==="patient"){
window.location.href="patient-dashboard.html"
}

}

else{

alert("Invalid login credentials")

}

})


</script>

</body>
</html>
