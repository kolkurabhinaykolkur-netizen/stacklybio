<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#2f3a46;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* container */

.error-wrapper{
max-width:700px;
padding:40px;
animation:fadeUp 1s ease;
}

/* big number */

.error-code{
font-size:120px;
font-weight:700;
color:#4c8fe3;
margin-bottom:10px;
}

/* heading */

.error-title{
font-size:32px;
margin-bottom:15px;
}

/* text */

.error-text{
color:#a5afba;
line-height:1.6;
margin-bottom:30px;
}

/* button */

.home-btn{
display:inline-block;
background:#4c8fe3;
color:white;
padding:14px 32px;
border-radius:6px;
text-decoration:none;
transition:0.3s;
}

.home-btn:hover{
background:#3a78c8;
}

/* animation */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* responsive */

@media(max-width:768px){

.error-code{
font-size:90px;
}

.error-title{
font-size:26px;
}

}

@media(max-width:480px){

.error-code{
font-size:70px;
}

.error-title{
font-size:22px;
}

.error-text{
font-size:14px;
}

}

</style>

</head>


<body>

<div class="error-wrapper">

<div class="error-code">404</div>

<h1 class="error-title">Page Not Found</h1>

<p class="error-text">
Sorry, the page you are looking for does not exist or has been moved.
Please check the URL or return to the homepage.
</p>

<a href="index.html" class="home-btn">Back to Home</a>

</div>

</body>

</html>
