<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Biotechnology | Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#3a1c71,#8e2de2,#4a00e0);
padding:20px;
}

.container{
background:white;
width:100%;
max-width:420px;
padding:35px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width: 120px;
}

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:6px;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
outline:none;
}

input:focus,select:focus{
border-color:#6a11cb;
}

.error{
color:red;
font-size:12px;
margin-bottom:10px;
display:none;
}

.input-error{
border-color:red;
}

.password-box{
position:relative;
}

.password-box span{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
}

button{
width:100%;
padding:13px;
margin-top:10px;
background:linear-gradient(90deg,#6a11cb,#2575fc);
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.success{
text-align:center;
color:green;
margin-top:10px;
}

.login{
text-align:center;
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="images/logo2.webp">
</div>

<h2>Create Your Account</h2>

<form id="registerForm">

<label>Full Name</label>
<input type="text" id="name">
<div class="error" id="nameError">Only alphabets allowed</div>

<label>Email Address</label>
<input type="email" id="email">
<div class="error" id="emailError">Enter valid email</div>

<label>Phone Number</label>
<input type="text" id="phone">
<div class="error" id="phoneError">Phone must be 10 digits</div>

<label>Role</label>
<select id="role">
<option value="">Select Role</option>
<option value="admin">Administrator</option>
<option value="researcher">Researcher</option>
<option value="patient">Patient</option>
</select>
<div class="error" id="roleError">Please select role</div>

<label>Password</label>

<div class="password-box">
<input type="password" id="password">
<span onclick="togglePassword('password')">👁</span>
</div>
<div class="error" id="passwordError">Password required</div>

<label>Confirm Password</label>

<div class="password-box">
<input type="password" id="confirmPassword">
<span onclick="togglePassword('confirmPassword')">👁</span>
</div>
<div class="error" id="confirmPasswordError">Passwords do not match</div>

<button>Create Account</button>

</form>

<p class="success" id="successMsg"></p>

<div class="login">
Already have account? <a href="login.html">Login</a>
</div>

</div>

<script>

function togglePassword(id){

let field=document.getElementById(id)

field.type=field.type==="password"?"text":"password"

}


// Restrict name

document.getElementById("name").addEventListener("input",function(){

this.value=this.value.replace(/[^a-zA-Z ]/g,'')

})


// Restrict phone

document.getElementById("phone").addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,'')

if(this.value.length>10){
this.value=this.value.slice(0,10)
}

})


document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault()

let valid=true

let name=document.getElementById("name")
let email=document.getElementById("email")
let phone=document.getElementById("phone")
let role=document.getElementById("role")
let password=document.getElementById("password")
let confirmPassword=document.getElementById("confirmPassword")

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/


// Reset errors

document.querySelectorAll(".error").forEach(e=>e.style.display="none")
document.querySelectorAll("input,select").forEach(e=>e.classList.remove("input-error"))


// Name validation

if(name.value.trim()===""){

name.classList.add("input-error")
document.getElementById("nameError").style.display="block"
valid=false

}


// Email validation

if(!email.value.match(emailPattern)){

email.classList.add("input-error")
document.getElementById("emailError").style.display="block"
valid=false

}


// Phone validation

if(phone.value.length!==10){

phone.classList.add("input-error")
document.getElementById("phoneError").style.display="block"
valid=false

}


// Role validation

if(role.value===""){

role.classList.add("input-error")
document.getElementById("roleError").style.display="block"
valid=false

}


// Password validation

if(password.value===""){

password.classList.add("input-error")
document.getElementById("passwordError").style.display="block"
valid=false

}


// Confirm password

if(password.value!==confirmPassword.value){

confirmPassword.classList.add("input-error")
document.getElementById("confirmPasswordError").style.display="block"
valid=false

}


if(!valid) return


let user={
name:name.value,
email:email.value,
phone:phone.value,
role:role.value,
password:password.value
}

localStorage.setItem("stacklyUser",JSON.stringify(user))

document.getElementById("successMsg").innerText="Credentials saved successfully"

setTimeout(()=>{

window.location.href="login.html"

},2000)

})

</script>

</body>
</html>
